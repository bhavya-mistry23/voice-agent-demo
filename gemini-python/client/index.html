<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>PM Agent</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        #status {
            color: #eee;
            font-size: 18px;
        }

        .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #555;
            margin-right: 8px;
        }

        .dot.connected {
            background: #4caf50;
            animation: pulse 1.5s infinite;
        }

        .dot.speaking {
            background: #2196f3;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }
    </style>
</head>

<body>
    <div id="status"><span class="dot" id="dot"></span><span id="label">Connecting...</span></div>

    <script>
        (async () => {
            const dot = document.getElementById('dot');
            const label = document.getElementById('label');

            function setStatus(text, state) {
                label.textContent = text;
                dot.className = 'dot ' + (state || '');
            }

            // ── 1. Get WebSocket URL from query param ?wss=wss://your-ngrok-url ────────
            const params = new URLSearchParams(window.location.search);
            const wsUrl = params.get('wss');
            if (!wsUrl) {
                setStatus('Missing ?wss= param');
                return;
            }

            // ── 2. Request microphone access ────────────────────────────────────────────
            let stream;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (e) {
                setStatus('Mic access denied');
                return;
            }

            // ── 3. Set up audio context for capture + playback ──────────────────────────
            const audioCtx = new AudioContext({ sampleRate: 24000 });
            const source = audioCtx.createMediaStreamSource(stream);
            const processor = audioCtx.createScriptProcessor(4096, 1, 1);

            // Audio playback queue
            let playbackQueue = [];
            let isPlaying = false;

            async function playNext() {
                if (isPlaying || playbackQueue.length === 0) return;
                isPlaying = true;
                const pcm16 = playbackQueue.shift();

                // Convert PCM16 bytes to float32
                const int16 = new Int16Array(pcm16);
                const float32 = new Float32Array(int16.length);
                for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

                const buffer = audioCtx.createBuffer(1, float32.length, 24000);
                buffer.copyToChannel(float32, 0);
                const bufferSource = audioCtx.createBufferSource();
                bufferSource.buffer = buffer;
                bufferSource.connect(audioCtx.destination);
                bufferSource.onended = () => { isPlaying = false; playNext(); dot.className = 'dot connected'; };
                bufferSource.start();
                dot.className = 'dot speaking';
            }

            // ── 4. Open WebSocket to Python server ──────────────────────────────────────
            const ws = new WebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                setStatus('PM Agent — Live', 'connected');

                // Start streaming mic audio to server
                source.connect(processor);
                processor.connect(audioCtx.destination);

                processor.onaudioprocess = (e) => {
                    if (ws.readyState !== WebSocket.OPEN) return;

                    // Convert float32 mic input → PCM16 → base64
                    const float32 = e.inputBuffer.getChannelData(0);
                    const int16 = new Int16Array(float32.length);
                    for (let i = 0; i < float32.length; i++) {
                        int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
                    }
                    const b64 = btoa(String.fromCharCode(...new Uint8Array(int16.buffer)));

                    ws.send(JSON.stringify({
                        type: 'input_audio_buffer.append',
                        audio: b64
                    }));
                };
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);

                    if (msg.type === 'response.audio.delta' && msg.delta) {
                        // Decode base64 PCM16 audio from Gemini and queue for playback
                        const binary = atob(msg.delta);
                        const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        playbackQueue.push(bytes.buffer);
                        playNext();
                    }

                } catch (e) {
                    console.error('Message parse error:', e);
                }
            };

            ws.onclose = () => setStatus('Disconnected', '');
            ws.onerror = (e) => { console.error(e); setStatus('Connection error', ''); };

        })();
    </script>
</body>

</html>
