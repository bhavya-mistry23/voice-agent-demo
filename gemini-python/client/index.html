<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>PM Agent</title>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
        }

        #status {
            color: #eee;
            font-size: 18px;
        }

        .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #555;
            margin-right: 8px;
        }

        .dot.connected {
            background: #4caf50;
            animation: pulse 1.5s infinite;
        }

        .dot.speaking {
            background: #2196f3;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }
    </style>
</head>

<body>
    <div id="status"><span class="dot" id="dot"></span><span id="label">Connecting...</span></div>
    <script>
        (async () => {
            const dot = document.getElementById('dot');
            const label = document.getElementById('label');
            function setStatus(text, state) { label.textContent = text; dot.className = 'dot ' + (state || ''); }

            const params = new URLSearchParams(window.location.search);
            const wsUrl = params.get('wss');
            if (!wsUrl) { setStatus('Missing ?wss= param'); return; }

            // Audio context for PLAYBACK only — no mic capture here
            // Meeting audio comes to Python server via Recall.ai's real-time audio stream
            const audioCtx = new AudioContext({ sampleRate: 24000 });
            let playbackQueue = [];
            let isPlaying = false;

            async function playNext() {
                if (isPlaying || playbackQueue.length === 0) return;
                isPlaying = true;
                const pcm16 = playbackQueue.shift();
                const int16 = new Int16Array(pcm16);
                const float32 = new Float32Array(int16.length);
                for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
                const buffer = audioCtx.createBuffer(1, float32.length, 24000);
                buffer.copyToChannel(float32, 0);
                const src = audioCtx.createBufferSource();
                src.buffer = buffer;
                src.connect(audioCtx.destination);
                src.onended = () => { isPlaying = false; playNext(); dot.className = 'dot connected'; };
                src.start();
                dot.className = 'dot speaking';
            }

            const ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                setStatus('PM Agent — Live', 'connected');
                // Resume audio context on user gesture (browser requirement)
                if (audioCtx.state === 'suspended') audioCtx.resume();
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'response.audio.delta' && msg.delta) {
                        const binary = atob(msg.delta);
                        const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        playbackQueue.push(bytes.buffer);
                        playNext();
                    }
                } catch (e) { console.error('Parse error:', e); }
            };

            ws.onclose = () => setStatus('Disconnected', '');
            ws.onerror = (e) => { console.error(e); setStatus('Connection error', ''); };
        })();
    </script>
</body>

</html>
